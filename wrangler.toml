name = "webwaka-professional-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Staging Environment
[env.staging]
name = "webwaka-professional-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env staging

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "923d38ece94d4947910a0555e773074d" },
  { binding = "EVENTS", id = "3d36f91dfae64ec3b64a7e11d5c327a8" },
  { binding = "RATE_LIMIT_KV", id = "2207155d8f934f6aa3209ad09ca1ba68" }
]
[[env.staging.d1_databases]]
binding = "DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-staging"

# Production Environment
[env.production]
name = "webwaka-professional-api-prod"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env production

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "5e69da72913c49908cd7dc0524bcc0a8" },
  { binding = "EVENTS", id = "40cdfdb455b4466c8977f575edd0d779" },
  { binding = "RATE_LIMIT_KV", id = "4c3ba07961354074854d0ade2e1cf85b" }
]
[[env.production.d1_databases]]
binding = "DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-prod"
