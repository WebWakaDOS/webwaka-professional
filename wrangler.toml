name = "webwaka-professional-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Staging Environment
[env.staging]
name = "webwaka-professional-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env staging

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "d870d125-0530-406d-8786-d04e07c5d0f5" },
  { binding = "EVENTS", id = "d870d125-0530-406d-8786-d04e07c5d0f5" },
  { binding = "RATE_LIMIT_KV", id = "2207155d8f934f6aa3209ad09ca1ba68" }
]
[[env.staging.d1_databases]]
binding = "DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-staging"

# Production Environment
[env.production]
name = "webwaka-professional-api-prod"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env production

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "d1d3b537-d0d5-40ea-8523-9d4727a00bc1" },
  { binding = "EVENTS", id = "d1d3b537-d0d5-40ea-8523-9d4727a00bc1" },
  { binding = "RATE_LIMIT_KV", id = "4c3ba07961354074854d0ade2e1cf85b" }
]
[[env.production.d1_databases]]
binding = "DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-prod"
