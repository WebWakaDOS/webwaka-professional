name = "webwaka-professional-api"
main = "src/modules/legal-practice/api/index.ts"
compatibility_date = "2024-03-14"

# Staging Environment
[env.staging]
name = "webwaka-professional-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env staging

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "d870d125-0530-406d-8786-d04e07c5d0f5" },
  { binding = "EVENTS", id = "d870d125-0530-406d-8786-d04e07c5d0f5" },
  { binding = "RATE_LIMIT_KV", id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID" }
]
[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-professional-db-staging"
database_id = "66c38966-6906-46df-b106-be19b54c4c13"

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-staging"

# Production Environment
[env.production]
name = "webwaka-professional-api-prod"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env production

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "d1d3b537-d0d5-40ea-8523-9d4727a00bc1" },
  { binding = "EVENTS", id = "d1d3b537-d0d5-40ea-8523-9d4727a00bc1" },
  { binding = "RATE_LIMIT_KV", id = "REPLACE_WITH_PROD_RATE_LIMIT_KV_ID" }
]
[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-professional-db-prod"
database_id = "acfdfc4d-e63a-4482-977a-82376b68f578"

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "webwaka-professional-docs-prod"
