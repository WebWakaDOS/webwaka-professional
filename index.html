<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a472a" />
  <meta name="description" content="WebWaka Professional — Legal Practice Management. Cases, Clients, Billing, NBA Compliance. Nigeria First." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WW Legal" />
  <!-- NDPR Privacy Notice -->
  <meta name="privacy-policy" content="/privacy" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />
  <title>WebWaka Professional</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #f8f9fa;
    }
    #root { height: 100%; }
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a472a;
      color: #fff;
      font-size: 1.1rem;
    }
    #app-loading .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="app-loading">
      <div class="spinner"></div>
      <span>WebWaka Professional</span>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register service worker — PWA First, Offline First
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then((registration) => {
            // Request background sync permission
            if ('sync' in registration) {
              registration.sync.register('webwaka-professional-sync').catch(() => {});
            }
          })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
