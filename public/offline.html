<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebWaka Professional — Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a472a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      text-align: center;
      box-sizing: border-box;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { opacity: 0.85; max-width: 320px; line-height: 1.6; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #d4a017;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">⚖️</div>
  <h1>You are offline</h1>
  <p>WebWaka Professional is running in offline mode. Your data is safely stored on this device and will sync automatically when you reconnect.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
